<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>资产 - 好友数据联动版 (圆角)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
/* ====== 忧郁极简风 - 最终完全版 (厚重悬浮 + 独立灰块) ====== */
:root {
    /* 核心色调 */
    --bg-color: #DCE0E5;       /* 深冷灰色背景 */
    --card-bg: #EBECEF;        /* 浅灰悬浮卡片 */
    
    /* 文本颜色 - 配合加粗字体加深 */
    --text-main: #1A1A1C;      
    --text-secondary: #7A7C80; 
    --text-tertiary: #B0B2B8;
    
    /* 低饱和度的数据颜色 */
    --muted-positive: #5C6B73; 
    --muted-negative: #8A7E7A; 
    --muted-neutral: #1A1A1C;
    
    /* 核心阴影：双层弥散悬浮感 */
    --card-shadow: 0 16px 32px rgba(0, 0, 0, 0.06), 0 4px 12px rgba(0, 0, 0, 0.03);
    --btn-shadow: 0 6px 16px rgba(0, 0, 0, 0.05);
    
    --divider: rgba(0, 0, 0, 0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }

body { margin: 0 !important; padding: 0 !important; width: 100vw; height: 100vh; background-color: var(--bg-color); overflow: hidden; display: flex; justify-content: center; color: var(--text-main); }

.number-font { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.2px; }

.phone-container { width: 100% !important; height: 100% !important; background-color: var(--bg-color); position: relative; overflow: hidden; display: flex; flex-direction: column; }

/* --- 顶部状态栏 & 导航栏 --- */
.status-bar { position: absolute; top: 14px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 28px; box-sizing: border-box; font-size: 14px; font-weight: 600; color: var(--text-main); z-index: 100; pointer-events: none; }

.nav-bar { position: absolute; top: 0; width: 100%; height: 88px; padding-top: 40px; display: flex; justify-content: center; align-items: center; font-size: 17px; font-weight: 600; background: rgba(220, 224, 229, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 90; letter-spacing: 0.5px; color: var(--text-main); }

.back-btn { position: absolute; left: 24px; bottom: 12px; font-size: 26px; font-weight: 400; color: var(--text-secondary); cursor: pointer; line-height: 1; transition: opacity 0.2s; }
.back-btn:active { opacity: 0.4; }

/* --- AI 刷新按钮 --- */
#ai-btn { position: absolute; right: 20px; bottom: 12px; font-size: 13px; font-weight: 600; color: var(--text-main); background: var(--card-bg); padding: 6px 14px; border-radius: 16px; cursor: pointer; transition: all 0.2s ease; box-shadow: var(--btn-shadow); user-select: none; -webkit-tap-highlight-color: transparent; letter-spacing: 0.5px; }
#ai-btn:active { transform: scale(0.94); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04); }

/* --- 主体滚动区域 --- */
.scroll-content { flex: 1; overflow-y: auto; padding: 98px 20px 40px 20px; margin-top: 0; }
.scroll-content::-webkit-scrollbar { display: none; }

/* --- 分段控制器 (Tabs) --- */
.segmented-control { display: flex; background: rgba(0, 0, 0, 0.05); border-radius: 20px; padding: 4px; margin: 10px 0 16px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.segmented-control::-webkit-scrollbar { display: none; }
.segment { flex: 0 0 auto; min-width: 80px; text-align: center; padding: 8px 16px; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-radius: 16px; cursor: pointer; transition: all 0.3s ease; white-space: nowrap; }
.segment.active { color: var(--text-main); background: var(--card-bg); box-shadow: var(--btn-shadow); }

/* --- 通用悬浮卡片 (顶部资产卡片 & 底部备注卡片) --- */
.net-worth-card, .notes-block { background: var(--card-bg); border-radius: 24px; box-shadow: var(--card-shadow); }

.net-worth-card { padding: 32px 24px; margin-bottom: 24px; margin-top: 10px; display: flex; flex-direction: column; align-items: center; text-align: center; }
.net-worth-title { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px; }
/* 净资产大数字：允许长数字换行，设置合适行高 */
.net-worth-amount { font-size: 40px; font-weight: 600; color: var(--text-main); margin-bottom: 32px; letter-spacing: -1px; word-break: break-all; line-height: 1.1; width: 100%; }

/* 内部下陷的三个小标签 */
.tags-container { display: flex; justify-content: space-between; gap: 12px; width: 100%; }
.tag-box { 
    flex: 1; 
    background: var(--bg-color); 
    border-radius: 16px; 
    padding: 14px 8px; 
    text-align: center; 
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
    min-width: 0; 
}
.tag-title { font-size: 11px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; white-space: nowrap; }
/* 子金额：允许长数字换行 */
.tag-amount { 
    font-size: 15px; 
    font-weight: 600; 
    word-break: break-all; 
    line-height: 1.2;
    width: 100%; 
}

/* --- 资产构成列表区 (独立高级灰模块) --- */
.section-title { font-size: 16px; font-weight: 600; margin: 0 0 12px 8px; color: var(--text-secondary); letter-spacing: 0.5px; }

/* 容器全透明，不要统一底色 */
.card-block { background: transparent !important; box-shadow: none !important; padding: 0 8px; margin-bottom: 24px; border-radius: 0; }

/* 单个列表项：浅冷灰悬浮胶囊 */
.list-item { 
    display: flex; 
    align-items: center; 
    background: #E2E4E9; 
    border-radius: 20px; 
    padding: 16px 20px; 
    margin-bottom: 14px; 
    border-bottom: none; 
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), inset 0 2px 4px rgba(255, 255, 255, 0.4); 
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.list-item:active {
    transform: scale(0.98);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03), inset 0 2px 4px rgba(255, 255, 255, 0.2);
}

/* 图标：深色内凹陷 */
.item-icon { 
    width: 44px; 
    height: 44px; 
    border-radius: 50%; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    background: #D5D8DF; 
    color: #55575C; 
    font-size: 18px; 
    margin-right: 16px; 
    box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.06); 
    flex-shrink: 0;
}

/* 列表文字排版 */
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 15px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-sub { font-size: 12px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
/* 列表内金额：允许长数字换行 */
.item-amount { 
    font-size: 16px; 
    font-weight: 600; 
    flex-shrink: 0; 
    margin-left: 10px; 
    max-width: 45%; 
    word-break: break-all; 
    text-align: right; 
    line-height: 1.2;
}

/* 数字的低饱和度颜色类 */
.text-positive { color: var(--muted-positive); }
.text-negative { color: var(--muted-negative); }
.text-neutral { color: var(--muted-neutral); }

/* --- 底部财务备注 --- */
.notes-block { padding: 24px; margin-bottom: 30px; }
.notes-text { font-size: 14px; line-height: 1.8; color: var(--text-secondary); font-weight: 500; text-align: justify; }

/* --- 空状态 --- */
.empty-state { padding: 60px 20px; text-align: center; color: var(--text-tertiary); font-size: 15px; font-weight: 500; letter-spacing: 0.5px; }
    </style>
</head>

<body>
<div class="phone-container">
    <div class="status-bar" id="status-bar">
        <span id="clock"></span> 
        <div style="display: flex; align-items: center; gap: 6px; font-size: 14px;">
            <span>📶</span>
            <i class="fa-solid fa-wifi" style="-webkit-text-stroke: 0.5px var(--text-main);"></i>
            <span>🔋</span>
        </div>
    </div>

    <div class="nav-bar" id="navBar">
        <div class="back-btn" onclick="if(typeof parent.closeApp === 'function') parent.closeApp()">‹</div>
        资产查看
        <div id="ai-btn">AI刷新</div>
    </div>

    <div class="scroll-content" id="scrollContent">
        
        <div class="segmented-control" id="user-switcher"></div>

        <div id="main-content">
            <div class="net-worth-card">
                <div class="net-worth-title">
                    <span id="current-user-title">净资产估算 (元)</span>
                    <i class="fa-regular fa-eye" style="font-size: 12px;"></i>
                </div>
                <div class="net-worth-amount number-font" id="val-total">¥0.00</div>
                
                <div class="tags-container">
                    <div class="tag-box">
                        <div class="tag-title">流动资金</div>
                        <div class="tag-amount number-font text-neutral" id="val-liquid">0.00</div>
                    </div>
                    <div class="tag-box">
                        <div class="tag-title">资产项</div>
                        <div class="tag-amount number-font text-positive" id="val-asset">0.00</div>
                    </div>
                    <div class="tag-box">
                        <div class="tag-title">负债</div>
                        <div class="tag-amount number-font text-negative" id="val-debt">0.00</div>
                    </div>
                </div>
            </div>

            <h2 class="section-title">资产构成</h2>
            <div class="card-block">
                <div class="list-item">
                    <div class="item-icon icon-bank"><i class="fa-solid fa-building-columns"></i></div>
                    <div class="item-info">
                        <div class="item-name">招商银行储蓄卡</div>
                        <div class="item-sub">尾号 6222</div>
                    </div>
                    <div class="item-amount number-font text-neutral" id="val-bank">¥--</div>
                </div>
                <div class="list-item">
                    <div class="item-icon icon-wechat"><i class="fa-brands fa-weixin"></i></div>
                    <div class="item-info">
                        <div class="item-name">微信零钱</div>
                        <div class="item-sub">含理财通</div>
                    </div>
                    <div class="item-amount number-font text-neutral" id="val-wechat">¥--</div>
                </div>
                <div class="list-item">
                    <div class="item-icon icon-credit"><i class="fa-brands fa-alipay"></i></div>
                    <div class="item-info">
                        <div class="item-name">花呗 / 信用卡</div>
                        <div class="item-sub">本月待还</div>
                    </div>
                    <div class="item-amount number-font text-negative" id="val-credit">-¥--</div>
                </div>
            </div>

            <h2 class="section-title">财务备注</h2>
            <div class="notes-block">
                <div class="notes-text" id="financial-note">
                    <i class="fa-solid fa-user-secret" style="color: #576b95; margin-right: 4px;"></i>
                    正在加载好友数据...
                </div>
            </div>
        </div>

        <div id="empty-view" class="empty-state" style="display: none;">
            <i class="fa-solid fa-users-slash" style="font-size: 48px; margin-bottom: 16px; opacity: 0.2;"></i>
            <p>暂无好友资产数据<br>请先在微信模拟器中添加好友</p>
        </div>
    </div>
</div>

<script>
    // --- 1. 时间更新 ---
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').textContent = 
            `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    }
    updateTime();
    setInterval(updateTime, 1000);

    // --- 全局变量 ---
    let currentUser = null; 
    let currentUserName = '';

    // --- 2. 联动微信好友数据 ---
    function initUserList() {
        const switcher = document.getElementById('user-switcher');
        switcher.innerHTML = ''; 

        // 只读取微信好友列表
        const friends = JSON.parse(localStorage.getItem('wx_friends')) || [];

        if (friends.length === 0) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('empty-view').style.display = 'block';
            document.getElementById('ai-btn').style.display = 'none';
            return;
        }

        document.getElementById('main-content').style.display = 'block';
        document.getElementById('empty-view').style.display = 'none';
        document.getElementById('ai-btn').style.display = 'block';

        // 遍历好友生成 Tabs
        friends.forEach((f, index) => {
            const fTab = document.createElement('div');
            fTab.className = 'segment' + (index === 0 ? ' active' : '');
            fTab.innerText = f.name;
            fTab.onclick = function() { switchUser(f.id, f.name, this); };
            switcher.appendChild(fTab);
            
            // 默认选中第一个好友
            if (index === 0) {
                currentUser = f.id;
                currentUserName = f.name;
            }
        });

        if (currentUser) {
            loadSavedAssets(currentUser);
            updateTitles(currentUserName);
        }
    }

    // --- 3. 切换逻辑 ---
    function switchUser(userId, userName, element) {
        currentUser = userId;
        currentUserName = userName;
        
        document.querySelectorAll('.segment').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        element.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

        updateTitles(userName);
        loadSavedAssets(userId);
    }

    function updateTitles(name) {
        // 只更新头部的标题，不在这里覆盖财务备注，保证AI生成的备注能留存
        document.getElementById('current-user-title').innerText = `${name} 的净资产 (元)`;
    }

    // --- 4. 存储逻辑 ---
    function loadSavedAssets(userId) {
        const savedData = localStorage.getItem('zichan_history_' + userId);
        if (savedData) {
            const data = JSON.parse(savedData);
            document.getElementById('val-total').innerText = '¥' + data.total;
            document.getElementById('val-liquid').innerText = data.liquid;
            document.getElementById('val-asset').innerText = data.asset;
            document.getElementById('val-debt').innerText = data.debt;
            
            // 恢复子项数据
            document.getElementById('val-bank').innerText = '¥' + (data.bank || '--');
            document.getElementById('val-wechat').innerText = '¥' + (data.wechat || '--');
            // 确保负债显示负号格式正确
            const safeCredit = data.credit ? data.credit.replace('-', '') : '--';
            document.getElementById('val-credit').innerText = '-¥' + safeCredit;
            
            // 恢复AI生成的备注
            const noteText = data.note ? data.note : `您正在查看 ${currentUserName} 的资产预估数据。`;
            document.getElementById('financial-note').innerHTML = `<i class="fa-solid fa-user-secret" style="color: #576b95; margin-right: 4px;"></i>` + noteText;
        } else {
            document.getElementById('val-total').innerText = '¥0.00';
            document.getElementById('val-liquid').innerText = '0.00';
            document.getElementById('val-asset').innerText = '0.00';
            document.getElementById('val-debt').innerText = '0.00';
            document.getElementById('val-bank').innerText = '¥--';
            document.getElementById('val-wechat').innerText = '¥--';
            document.getElementById('val-credit').innerText = '-¥--';
            document.getElementById('financial-note').innerHTML = `<i class="fa-solid fa-user-secret" style="color: #576b95; margin-right: 4px;"></i>您正在查看 ${currentUserName} 的资产预估数据。`;
        }
    }

    window.onload = initUserList;

    // --- 5. AI 生成 ---
    document.getElementById('ai-btn').addEventListener('click', async function() {
        const configStr = localStorage.getItem('aiConfig');
        if (!configStr) {
            alert("请先去设置中配置 API！");
            return;
        }
        const config = JSON.parse(configStr);
        const btn = this;
        btn.innerText = "生成中...";
        btn.style.pointerEvents = "none";

        // 更新后的 Prompt：要求 AI 一并生成 bank, wechat, credit 以及 note 字段
        const prompt = `你是一个财务模拟器。请为名为“${currentUserName}”的角色随机生成一份资产数据。要求：逻辑自洽。同时，根据生成的资产状况，用一两句话生成一段符合该角色的“财务状况分析/建议”作为备注。
        必须且仅输出 JSON 格式（不要有任何markdown包裹如 \`\`\`json）：
        {"total": "188,560.20", "liquid": "40,000.00", "asset": "158,560.20", "debt": "-10,000.00", "bank": "35,000.00", "wechat": "5,000.00", "credit": "10,000.00", "note": "近期流动资金充裕，但信用卡负债偏高，建议优先结清花呗及信用卡账单。""}`;

        try {
            let endpoint = config.baseUrl;
            if (!endpoint.endsWith('/chat/completions')) {
                endpoint = endpoint.replace(/\/+$/, '') + '/chat/completions';
            }

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${config.key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: config.model,
                    temperature: 0.9,
                    messages: [{ role: "user", content: prompt }]
                })
            });

            const data = await response.json();
            let aiText = data.choices[0].message.content.trim();
            // 容错处理
            aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();
            const result = JSON.parse(aiText);

            document.getElementById('val-total').innerText = '¥' + result.total;
            document.getElementById('val-liquid').innerText = result.liquid;
            document.getElementById('val-asset').innerText = result.asset;
            document.getElementById('val-debt').innerText = result.debt;

            // 填充子项数据
            document.getElementById('val-bank').innerText = '¥' + (result.bank || '0.00');
            document.getElementById('val-wechat').innerText = '¥' + (result.wechat || '0.00');
            const parsedCredit = result.credit ? result.credit.replace('-', '') : '0.00';
            document.getElementById('val-credit').innerText = '-¥' + parsedCredit;
            
            // 填充 AI 生成的备注
            const noteText = result.note ? result.note : `您正在查看 ${currentUserName} 的资产预估数据。`;
            document.getElementById('financial-note').innerHTML = `<i class="fa-solid fa-user-secret" style="color: #576b95; margin-right: 4px;"></i>` + noteText;

            localStorage.setItem('zichan_history_' + currentUser, JSON.stringify(result));

        } catch (error) {
            alert("生成失败: " + error.message);
        } finally {
            btn.innerText = "AI刷新";
            btn.style.pointerEvents = "auto";
        }
    });
</script>
</body>
</html>
